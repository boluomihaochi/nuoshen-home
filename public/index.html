<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>小楼</title>
<style>
  :root {
    --bg: #f6f3ed;
    --paper: #faf8f3;
    --nav-bg: #f1ede5;
    --border: #e5e0d5;
    --hairline: #eae5da;
    --text: #2b2721;
    --text-soft: #6b645a;
    --text-muted: #a49c8f;
    --accent: #b09468;
    --xiao-nuo: #6a9478;
    --ting-shu: #7a6e96;
    --nav-w: 248px;
    --serif: "Songti SC", "Noto Serif SC", "STSong", Georgia, serif;
    --sans: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; font-family: var(--sans); background: var(--bg); color: var(--text); }

  #shell { display: flex; height: 100dvh; overflow: hidden; }

  #overlay { display:none; position:fixed; inset:0; background:rgba(30,25,18,.28); z-index:100; }
  #overlay.show { display:block; }

  /* ── Sidebar ── */
  #nav {
    width: var(--nav-w); background: var(--nav-bg);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    flex-shrink: 0; z-index: 110; overflow-y: auto;
    transition: transform .28s ease;
  }
  #nav-profile { padding: 44px 20px 30px; text-align: center; }
  #avatars { display: flex; justify-content: center; margin-bottom: 16px; }
  .avatar {
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--paper); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--serif); font-size: 26px; color: var(--text-soft);
    box-shadow: 0 2px 10px rgba(60,50,35,.07);
    background-size: cover; background-position: center;
    cursor: pointer; overflow: hidden;
  }
  .avatar + .avatar { margin-left: -14px; }
  .avatar.ts { color: var(--ting-shu); z-index: 1; }
  .avatar.xn { color: var(--xiao-nuo); z-index: 2; }
  .avatar.has-img { color: transparent; }
  #couple-name {
    font-family: var(--serif); font-style: italic; font-weight: 700;
    font-size: 19px; letter-spacing: .04em; margin-bottom: 18px;
  }
  #together-label { font-size: 11px; color: var(--text-muted); letter-spacing: .5em; margin-bottom: 8px; text-indent: .5em; }
  #day-count { font-family: var(--serif); font-size: 46px; font-weight: 800; line-height: 1; }
  #day-count small { font-family: var(--sans); font-size: 14px; font-weight: 500; margin-left: 3px; color: var(--text); }
  #since { font-size: 10px; color: var(--text-muted); letter-spacing: .3em; margin-top: 10px; }

  #nav-items { flex: 1; padding: 6px 0 8px; }
  .nav-item {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: 17px 26px;
    font-family: var(--serif); font-size: 16px; letter-spacing: .02em;
    color: var(--text); background: none; border: none;
    border-top: 1px solid var(--hairline);
    cursor: pointer; text-align: left; transition: background .12s;
  }
  .nav-item:last-child { border-bottom: 1px solid var(--hairline); }
  .nav-item:hover { background: rgba(0,0,0,.03); }
  .nav-item.active { color: var(--text); font-weight: 700; }
  .nav-item.disabled { color: var(--text-muted); cursor: default; }
  .nav-item.disabled:hover { background: none; }
  .nav-tag {
    font-family: var(--sans); font-size: 10px; color: var(--text-muted);
    background: rgba(0,0,0,.045); border-radius: 10px; padding: 3px 9px;
  }

  /* ── 回忆（聊天日历）view ── */
  #view-recall { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  #view-recall.show { display: flex; }
  #recall-top { padding: 30px 34px 0; flex-shrink: 0; }
  #recall-top h2 { font-family: var(--serif); font-size: 24px; font-weight: 800; }
  #recall-top p { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
  #cal-wrap { flex: 1; overflow-y: auto; padding: 20px 34px 40px; }
  #cal-head {
    display: flex; align-items: center; justify-content: center; gap: 18px;
    margin-bottom: 16px;
  }
  #cal-head button {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    padding: 4px 13px; cursor: pointer; font-size: 15px; color: var(--text);
  }
  #cal-head button:hover { background: var(--border); }
  #cal-month { font-family: var(--serif); font-size: 17px; font-weight: 700; min-width: 130px; text-align: center; }
  #cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px;
    max-width: 480px; margin: 0 auto;
  }
  .cal-wd { text-align: center; font-size: 10px; color: var(--text-muted); padding: 4px 0; }
  .cal-day {
    aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 10px; font-size: 13px; color: var(--text-muted); gap: 3px;
    background: none; border: none; font-variant-numeric: tabular-nums;
  }
  .cal-day.has {
    color: var(--text); background: var(--paper); border: 1px solid var(--border);
    cursor: pointer; font-weight: 600;
  }
  .cal-day.has:hover { border-color: var(--accent); }
  .cal-day.today { box-shadow: inset 0 0 0 1.5px var(--accent); }
  .cal-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
  .cal-day:not(.has) .cal-dot { visibility: hidden; }
  #cal-count { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 18px; }

  /* 单日对话 */
  #recall-day-top {
    height: 54px; padding: 0 20px; border-bottom: 1px solid var(--border);
    display: none; align-items: center; gap: 10px; flex-shrink: 0; background: var(--bg);
  }
  #recall-day-title { flex: 1; font-family: var(--serif); font-size: 15px; font-weight: 700; }
  #aside-toggle {
    background: none; border: 1px solid var(--border); border-radius: 14px;
    padding: 5px 11px; font-size: 11px; color: var(--text-muted); cursor: pointer;
  }
  #aside-toggle.on { color: var(--ting-shu); border-color: var(--ting-shu); }
  #recall-chat { flex: 1; overflow-y: auto; padding: 22px 26px 50px; display: none; background: var(--paper); }
  .chat-row { display: flex; margin-bottom: 12px; }
  .chat-row.xn { justify-content: flex-end; }
  .chat-row.ts { justify-content: flex-start; }
  .chat-bubble {
    max-width: 72%; padding: 9px 13px; border-radius: 14px;
    font-size: 13.5px; line-height: 1.7; white-space: pre-wrap; word-break: break-word;
  }
  .chat-row.xn .chat-bubble { background: rgba(106,148,120,.13); border: 1px solid rgba(106,148,120,.25); border-top-right-radius: 4px; }
  .chat-row.ts .chat-bubble { background: rgba(122,110,150,.12); border: 1px solid rgba(122,110,150,.24); border-top-left-radius: 4px; }
  .chat-time { font-size: 9.5px; color: var(--text-muted); margin-top: 5px; }
  .chat-row.xn .chat-time { text-align: right; }
  .chat-aside {
    text-align: center; font-size: 11.5px; color: var(--text-muted);
    margin: 10px auto; max-width: 84%; line-height: 1.65; white-space: pre-wrap; word-break: break-word;
  }
  .chat-hour-mark {
    text-align: center; font-size: 10px; color: var(--text-muted);
    margin: 18px 0 10px; letter-spacing: .1em;
  }

  /* ── 动态 view ── */
  #view-activity { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  #view-activity.show { display: flex; }
  #act-top { padding: 30px 34px 0; flex-shrink: 0; }
  #act-top-row { display: flex; align-items: baseline; justify-content: space-between; }
  #act-top h2 { font-family: var(--serif); font-size: 24px; font-weight: 800; }
  #act-top p { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
  #act-cal-btn {
    background: none; border: 1px solid var(--border); border-radius: 14px;
    padding: 5px 13px; font-size: 11px; color: var(--text-muted); cursor: pointer;
  }
  #act-cal-btn.on { color: var(--accent); border-color: var(--accent); }
  #act-cal { display: none; margin: 14px auto 0; max-width: 340px; }
  #act-cal.show { display: block; }
  #act-cal-head { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 8px; }
  #act-cal-head button {
    background: none; border: 1px solid var(--border); border-radius: 7px;
    padding: 2px 11px; cursor: pointer; font-size: 13px; color: var(--text);
  }
  #act-cal-month { font-family: var(--serif); font-size: 14px; font-weight: 700; min-width: 100px; text-align: center; }
  #act-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  #act-cal-grid .cal-day { font-size: 12px; }
  #act-cal-grid .cal-day.sel { background: var(--text); color: var(--paper); border-color: var(--text); }
  #act-list { flex: 1; overflow-y: auto; padding: 6px 34px 44px; }
  .act-date {
    font-family: var(--serif); font-size: 13px; font-weight: 700; color: var(--text-soft);
    margin: 26px 0 6px; padding-bottom: 7px; border-bottom: 1px solid var(--hairline);
  }
  .act-row { display: flex; gap: 0; position: relative; padding: 0 0 0 2px; }
  .act-time {
    font-size: 11px; color: var(--text-muted); flex-shrink: 0;
    font-variant-numeric: tabular-nums; width: 44px; padding-top: 12px;
  }
  .act-line {
    display: flex; flex-direction: column; align-items: center;
    flex-shrink: 0; width: 20px;
  }
  .act-line::before, .act-line::after {
    content: ""; width: 1px; flex: 1; background: var(--hairline);
  }
  .act-row:first-of-type .act-line::before { background: transparent; }
  .act-row.last .act-line::after { background: transparent; }
  .act-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    margin: 3px 0; background: var(--text-muted);
  }
  .act-body { flex: 1; min-width: 0; padding: 10px 0 12px 12px; }
  .act-text { font-size: 13.5px; color: var(--text); line-height: 1.7; word-break: break-word; }
  .act-tag {
    display: inline-block; font-size: 10px; color: var(--text-muted);
    background: rgba(0,0,0,.045); border-radius: 9px; padding: 2px 8px;
    margin-top: 5px;
  }
  .act-empty { text-align: center; padding: 70px 20px; color: var(--text-muted); font-size: 13px; font-family: var(--serif); }

  /* ── Bottom bar (共读内) ── */
  #bottom-bar {
    display: flex; border-top: 1px solid var(--border); background: var(--nav-bg);
    flex-shrink: 0; padding-bottom: env(safe-area-inset-bottom);
  }
  .bb-item {
    flex: 1; padding: 12px 0 13px; background: none; border: none; cursor: pointer;
    font-size: 12px; color: var(--text-muted); display: flex; flex-direction: column;
    align-items: center; gap: 3px; transition: color .12s;
  }
  .bb-item .bb-icon { font-size: 17px; line-height: 1; }
  .bb-item.active { color: var(--text); font-weight: 600; }
  #bb-tsnotes.active { color: var(--ting-shu); }

  /* ── 宝宝的笔记 view ── */
  #view-tsnotes { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  #view-tsnotes.show { display: flex; }
  #tsn-top { padding: 30px 34px 0; flex-shrink: 0; }
  #tsn-top h2 { font-family: var(--serif); font-size: 24px; font-weight: 800; }
  #tsn-top p { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
  #tsn-list { flex: 1; overflow-y: auto; padding: 18px 26px 30px; }
  .tsn-book-title {
    font-family: var(--serif); font-size: 14px; font-weight: 700; color: var(--text-soft);
    margin: 18px 8px 10px; padding-bottom: 6px; border-bottom: 1px solid var(--hairline);
  }
  .tsn-card {
    background: var(--paper); border: 1px solid var(--border); border-radius: 12px;
    padding: 15px 17px; margin-bottom: 12px; font-size: 13.5px;
  }
  .tsn-content { line-height: 1.85; white-space: pre-wrap; font-family: var(--serif); }
  .tsn-time { font-size: 10px; color: var(--text-muted); margin-top: 8px; }

  /* ── Collection view ── */
  #view-collection { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  #view-collection.show { display: flex; }
  #coll-top { padding: 30px 34px 0; flex-shrink: 0; }
  #coll-top h2 { font-family: var(--serif); font-size: 24px; font-weight: 800; }
  #coll-books { display: flex; gap: 8px; overflow-x: auto; padding: 16px 34px 4px; flex-shrink: 0; }
  .coll-book-chip {
    border: 1px solid var(--border); background: var(--paper); border-radius: 16px;
    padding: 6px 14px; font-size: 12px; color: var(--text-muted); cursor: pointer;
    white-space: nowrap; flex-shrink: 0;
  }
  .coll-book-chip.active { background: var(--text); border-color: var(--text); color: var(--paper); }
  #coll-list { flex: 1; overflow-y: auto; padding: 14px 26px 30px; }
  .coll-ch-title {
    font-family: var(--serif); font-size: 13px; font-weight: 700; color: var(--text-soft);
    margin: 16px 8px 8px; padding-bottom: 6px; border-bottom: 1px solid var(--hairline);
  }
  .coll-empty { text-align: center; padding: 70px 20px; color: var(--text-muted); font-size: 13px; font-family: var(--serif); }

  /* ── Main ── */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  #mobile-bar {
    display: none; height: 50px; padding: 0 16px;
    border-bottom: 1px solid var(--border);
    align-items: center; gap: 12px; background: var(--bg); flex-shrink: 0;
  }
  #hamburger { background:none; border:none; cursor:pointer; color:var(--text); display:flex; padding:4px; }
  #mobile-title { font-family: var(--serif); font-size: 16px; font-weight: 700; flex: 1; }

  /* ── Shelf ── */
  #view-shelf { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #shelf-top-bar {
    padding: 30px 34px 0; flex-shrink: 0;
    display: flex; align-items: baseline; justify-content: space-between;
  }
  #shelf-top-bar h2 { font-family: var(--serif); font-size: 24px; font-weight: 800; }
  #add-book-btn {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--text); color: var(--paper); border: none;
    font-size: 18px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  #add-book-btn:hover { opacity: .78; }
  #file-input { display: none; }

  #shelf-tabs { display: flex; margin: 20px 34px 0; border-bottom: 1px solid var(--border); }
  .shelf-tab {
    padding: 9px 0; margin-right: 28px; font-size: 13px;
    color: var(--text-muted); background: none; border: none;
    border-bottom: 2px solid transparent; cursor: pointer;
    margin-bottom: -1px; transition: color .15s, border-color .15s;
  }
  .shelf-tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 600; }

  #book-grid { flex: 1; overflow-y: auto; padding: 20px 26px 30px; }
  .book-card {
    display: flex; gap: 16px; padding: 16px 12px;
    border-radius: 12px; cursor: pointer; transition: background .12s;
  }
  .book-card:hover { background: rgba(0,0,0,.035); }
  .book-cover {
    width: 58px; height: 78px; border-radius: 4px; flex-shrink: 0;
    display: flex; align-items: flex-end; padding: 7px;
    font-family: var(--serif); font-size: 13px; font-weight: 700;
    color: rgba(255,255,255,.92); line-height: 1.25;
    box-shadow: 2px 3px 10px rgba(50,40,25,.22);
    overflow: hidden;
  }
  .book-info { flex: 1; min-width: 0; padding-top: 2px; }
  .book-info-title { font-family: var(--serif); font-size: 16px; font-weight: 700; }
  .book-info-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .book-progress-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
  .progress-bar { flex: 1; max-width: 200px; height: 3px; background: rgba(0,0,0,.09); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; background: var(--accent); }
  .progress-pct { font-size: 10px; color: var(--text-muted); }
  .open-btn {
    margin-top: 10px; font-size: 12px; color: var(--text);
    background: none; border: 1px solid var(--text); border-radius: 15px;
    padding: 5px 14px; cursor: pointer; transition: all .12s;
  }
  .open-btn:hover { background: var(--text); color: var(--paper); }
  .shelf-empty { text-align: center; padding: 70px 20px; color: var(--text-muted); font-size: 13px; font-family: var(--serif); }

  /* ── Reader ── */
  #view-reader { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  #view-reader.show { display: flex; }
  #reader-top {
    height: 54px; padding: 0 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; flex-shrink: 0; background: var(--bg);
  }
  #back-btn {
    background: none; border: none; cursor: pointer; font-size: 13px;
    color: var(--text-muted); display: flex; align-items: center; gap: 4px; flex-shrink: 0;
  }
  #back-btn:hover { color: var(--text); }
  #reader-title { flex: 1; font-family: var(--serif); font-size: 15px; font-weight: 700; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  #chapter-nav { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  #chapter-nav button {
    background: transparent; border: 1px solid var(--border); border-radius: 6px;
    padding: 4px 12px; cursor: pointer; font-size: 14px; color: var(--text); line-height: 1;
  }
  #chapter-nav button:hover { background: var(--border); }
  #chapter-nav button:disabled { opacity: .3; cursor: default; }
  #ch-label {
    font-size: 11px; color: var(--text-muted); white-space: nowrap;
    max-width: 200px; overflow: hidden; text-overflow: ellipsis;
  }
  #finish-btn {
    font-size: 11px; color: var(--text-muted); background: none;
    border: 1px solid var(--border); border-radius: 14px; padding: 5px 11px; cursor: pointer; flex-shrink: 0;
  }
  #finish-btn.finished { color: var(--xiao-nuo); border-color: var(--xiao-nuo); }
  #notes-toggle {
    display: none; background: none; border: 1px solid var(--border); border-radius: 14px;
    padding: 5px 11px; font-size: 11px; color: var(--text-muted); cursor: pointer; position: relative;
  }
  #notes-badge {
    position: absolute; top: -5px; right: -5px; min-width: 15px; height: 15px;
    background: var(--accent); color: #fff; border-radius: 8px;
    font-size: 9px; line-height: 15px; padding: 0 4px; display: none;
  }

  #reader-content { flex: 1; display: flex; overflow: hidden; }
  #reader {
    flex: 1; overflow-y: auto; padding: 46px 64px 80px;
    font-family: var(--serif); line-height: 2.05; font-size: 16px; min-width: 0;
    background: var(--paper);
    transition: background .25s, color .25s;
  }
  #reader p { margin-bottom: 1.15em; }

  /* reading themes */
  #theme-btn {
    background: none; border: 1px solid var(--border); border-radius: 14px;
    padding: 4px 10px; font-size: 13px; cursor: pointer; flex-shrink: 0; line-height: 1.2;
  }
  #view-reader.theme-green #reader { background: #cde5cf; color: #2b352d; }
  #view-reader.theme-green #reader-top { background: #c2dcc5; border-color: #b0ccb4; }
  #view-reader.theme-dark #reader { background: #17171a; color: #b9b6b0; }
  #view-reader.theme-dark #reader-top { background: #1f1f23; border-color: #2e2e33; }
  #view-reader.theme-dark #reader-top button,
  #view-reader.theme-dark #back-btn, #view-reader.theme-dark #ch-label,
  #view-reader.theme-dark #reader-title { color: #b9b6b0; border-color: #3a3a40; }
  #view-reader.theme-dark mark.hl {
    background: linear-gradient(transparent 55%, rgba(200,175,130,.42) 55%);
  }
  #view-reader.theme-dark mark.hl.xn { background: linear-gradient(transparent 55%, rgba(126,180,144,.45) 55%); }
  #view-reader.theme-dark mark.hl.ts { background: linear-gradient(transparent 55%, rgba(150,136,190,.48) 55%); }
  mark.hl {
    background: linear-gradient(transparent 55%, rgba(176,148,104,.34) 55%);
    color: inherit; cursor: pointer; border-radius: 2px;
    padding: 0 1px;
  }
  mark.hl.xn { background: linear-gradient(transparent 55%, rgba(106,148,120,.32) 55%); }
  mark.hl.ts { background: linear-gradient(transparent 55%, rgba(122,110,150,.32) 55%); }

  /* selection popover — desktop: floats above selection; mobile: fixed bottom pill */
  #sel-pop {
    position: fixed; z-index: 130; display: none;
    background: var(--text); color: var(--paper);
    border-radius: 18px; padding: 8px 16px; font-size: 13px; cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,.25);
  }
  #sel-pop::after {
    content: ""; position: absolute; left: 50%; bottom: -5px; transform: translateX(-50%);
    border: 5px solid transparent; border-top-color: var(--text); border-bottom: none;
  }
  #sel-pop.bottom-pill {
    left: 50% !important; top: auto !important;
    bottom: calc(76px + env(safe-area-inset-bottom));
    transform: translateX(-50%);
    padding: 11px 26px; font-size: 14px; border-radius: 24px;
  }
  #sel-pop.bottom-pill::after { display: none; }

  /* ── Notes panel ── */
  #notes-panel {
    width: 300px; border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; background: var(--bg); flex-shrink: 0;
  }
  #notes-header {
    padding: 15px 18px; border-bottom: 1px solid var(--border);
    font-family: var(--serif); font-size: 14px; font-weight: 700;
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  #notes-close { display: none; background: none; border: none; font-size: 17px; cursor: pointer; color: var(--text-muted); }
  #notes-list { flex: 1; overflow-y: auto; padding: 12px; }
  .note-card {
    background: var(--paper); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 10px; font-size: 13px;
    transition: box-shadow .3s;
  }
  .note-card.flash { box-shadow: 0 0 0 2px var(--accent); }
  .note-author { font-size: 11px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .note-author.xiao-nuo .dot { background: var(--xiao-nuo); }
  .note-author.ting-shu .dot { background: var(--ting-shu); }
  .note-author.xiao-nuo { color: var(--xiao-nuo); }
  .note-author.ting-shu { color: var(--ting-shu); }
  .note-quote {
    font-family: var(--serif); font-size: 12px; color: var(--text-soft);
    border-left: 2px solid var(--accent); padding: 2px 0 2px 9px; margin-bottom: 7px;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .note-content { line-height: 1.65; }
  .note-time { font-size: 10px; color: var(--text-muted); margin-top: 6px; }
  .note-replies { margin-top: 9px; border-top: 1px solid var(--hairline); padding-top: 8px; }
  .reply-item { font-size: 12px; margin-bottom: 6px; line-height: 1.55; }
  .reply-author { font-weight: 600; font-size: 11px; }
  .reply-author.xiao-nuo { color: var(--xiao-nuo); }
  .reply-author.ting-shu { color: var(--ting-shu); }
  .note-actions { display: flex; gap: 14px; margin-top: 7px; }
  .reply-toggle, .del-btn {
    font-size: 11px; color: var(--text-muted); background: none; border: none;
    cursor: pointer; padding: 0;
  }
  .reply-toggle:hover { color: var(--text); }
  .del-btn:hover { color: #b0574e; }
  .reply-del {
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    font-size: 11px; padding: 0 2px; margin-left: 4px; opacity: .55;
  }
  .reply-del:hover { color: #b0574e; opacity: 1; }
  .reply-box { display: flex; gap: 6px; margin-top: 8px; }
  .reply-box input {
    flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px;
    font-size: 12px; font-family: inherit; background: var(--paper); outline: none; min-width: 0;
  }
  .reply-box input:focus { border-color: var(--accent); }
  .reply-box button {
    border: none; background: var(--text); color: var(--paper); border-radius: 8px;
    padding: 0 12px; font-size: 12px; cursor: pointer;
  }

  #add-note-area { padding: 12px; border-top: 1px solid var(--border); flex-shrink: 0; background: var(--bg); }
  #quote-preview {
    display: none; font-family: var(--serif); font-size: 11px; color: var(--text-soft);
    border-left: 2px solid var(--accent); padding: 3px 24px 3px 9px; margin-bottom: 8px;
    position: relative; max-height: 56px; overflow: hidden;
  }
  #quote-clear {
    position: absolute; right: 2px; top: 0; background: none; border: none;
    color: var(--text-muted); cursor: pointer; font-size: 13px;
  }
  #note-content {
    width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 8px 11px;
    font-size: 13px; font-family: inherit; background: var(--paper); color: var(--text);
    margin-bottom: 8px; resize: none; outline: none; height: 64px;
  }
  #note-content:focus { border-color: var(--accent); }
  #color-row { display: flex; align-items: center; gap: 9px; margin-bottom: 9px; }
  #color-row .cr-label { font-size: 10px; color: var(--text-muted); margin-right: 2px; }
  .color-dot {
    width: 20px; height: 20px; border-radius: 50%; border: 2px solid transparent;
    cursor: pointer; padding: 0; transition: transform .12s, border-color .12s;
  }
  .color-dot.none {
    background: var(--paper); border-color: var(--border); position: relative;
  }
  .color-dot.none::after {
    content: ""; position: absolute; left: 2px; right: 2px; top: 50%;
    height: 1.5px; background: var(--text-muted); transform: rotate(-45deg);
  }
  .color-dot.sel { border-color: var(--text); transform: scale(1.15); }
  #note-submit-row { display: flex; align-items: center; gap: 8px; }
  #note-as { font-size: 11px; color: var(--text-muted); flex: 1; }
  #note-as b.xiao-nuo { color: var(--xiao-nuo); }
  #note-as b.ting-shu { color: var(--ting-shu); }
  #submit-note {
    padding: 8px 18px; background: var(--text); color: var(--paper); border: none;
    border-radius: 16px; font-size: 12px; cursor: pointer;
  }
  #submit-note:hover { opacity: .78; }

  /* ── Study view ── */
  #view-study { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  #view-study.show { display: flex; }
  #study-top {
    padding: 30px 34px 0; flex-shrink: 0;
    display: flex; align-items: baseline; justify-content: space-between;
  }
  #study-top h2 { font-family: var(--serif); font-size: 24px; font-weight: 800; }
  #add-file-btn {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--text); color: var(--paper); border: none;
    font-size: 18px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  #study-list { flex: 1; overflow-y: auto; padding: 20px 26px 30px; }
  .file-row {
    display: flex; align-items: center; gap: 14px; padding: 14px 12px;
    border-radius: 12px; cursor: pointer; transition: background .12s;
  }
  .file-row:hover { background: rgba(0,0,0,.035); }
  .file-icon {
    width: 42px; height: 50px; border-radius: 5px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: #fff; letter-spacing: .05em;
    box-shadow: 1px 2px 8px rgba(50,40,25,.18);
  }
  .file-icon.txt, .file-icon.md { background: #8a8378; }
  .file-icon.pdf { background: #b0574e; }
  .file-icon.docx { background: #4e73b0; }
  .file-icon.pptx { background: #c07a3e; }
  .file-info { flex: 1; min-width: 0; }
  .file-name { font-size: 14px; font-weight: 600; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .file-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .file-del {
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    font-size: 15px; padding: 8px; flex-shrink: 0;
  }
  .file-del:hover { color: #b0574e; }
  #study-reader-top {
    height: 54px; padding: 0 20px; border-bottom: 1px solid var(--border);
    display: none; align-items: center; gap: 10px; flex-shrink: 0; background: var(--bg);
  }
  #study-reader-top .sr-title { flex: 1; font-family: var(--serif); font-size: 15px; font-weight: 700; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  #study-text {
    flex: 1; overflow-y: auto; padding: 40px 56px 80px; display: none;
    font-family: var(--serif); line-height: 1.95; font-size: 15px; background: var(--paper);
  }
  #study-text p { margin-bottom: 1em; }
  .study-page-mark {
    font-family: var(--sans); font-size: 11px; color: var(--text-muted);
    margin: 22px 0 10px; padding-top: 12px; border-top: 1px dashed var(--border);
  }

  /* ── placeholder view ── */
  #view-soon { flex: 1; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
  #view-soon.show { display: flex; }
  #view-soon .soon-title { font-family: var(--serif); font-size: 20px; font-weight: 700; }
  #view-soon .soon-sub { font-size: 12px; color: var(--text-muted); }

  /* ── clawd 桌宠 ── */
  #clawd {
    position: fixed; right: 12px; bottom: calc(86px + env(safe-area-inset-bottom));
    width: 76px; height: 52px; z-index: 90; cursor: pointer;
    image-rendering: pixelated; user-select: none;
  }
  #clawd-say {
    position: fixed; right: 16px; bottom: calc(150px + env(safe-area-inset-bottom));
    z-index: 90; background: var(--paper); border: 1px solid var(--border);
    border-radius: 12px 12px 2px 12px; padding: 6px 11px; font-size: 11px;
    color: var(--text-soft); box-shadow: 0 2px 10px rgba(60,50,35,.12);
    display: none; max-width: 180px;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  ::selection { background: rgba(176,148,104,.3); }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    #nav { position: fixed; top: 0; left: 0; bottom: 0; transform: translateX(-100%); box-shadow: 4px 0 24px rgba(0,0,0,.1); }
    #nav.open { transform: translateX(0); }
    #mobile-bar { display: flex; }
    #notes-toggle { display: block; }
    #reader { padding: 30px 22px 80px; }
    #notes-panel {
      position: fixed; bottom: 0; left: 0; right: 0; width: 100%; height: 72vh;
      border-left: none; border-top: 1px solid var(--border);
      border-radius: 18px 18px 0 0; transform: translateY(100%);
      transition: transform .28s ease; z-index: 120;
      box-shadow: 0 -6px 28px rgba(0,0,0,.1);
    }
    #notes-panel.open { transform: translateY(0); }
    #notes-close { display: block; }
    #shelf-top-bar { padding: 22px 18px 0; }
    #act-top { padding: 22px 18px 0; }
    #act-list { padding: 4px 16px 40px; }
    #recall-top { padding: 22px 18px 0; }
    #cal-wrap { padding: 16px 14px 36px; }
    #recall-chat { padding: 16px 12px 44px; }
    .chat-bubble { max-width: 82%; }
    #shelf-tabs { margin: 16px 18px 0; }
    #book-grid { padding: 14px 8px 24px; }
    #reader-top { padding: 0 10px; gap: 5px; justify-content: space-between; }
    #reader-title { display: none; }
    /* 手机太窄：章节名不显示（正文开头就有），只留翻页箭头 */
    #ch-label { display: none; }
    #chapter-nav button { padding: 4px 10px; }
    #finish-btn, #notes-toggle { padding: 5px 9px; white-space: nowrap; }
  }
</style>
</head>
<body>

<div id="overlay" onclick="closeAll()"></div>

<div id="sel-pop" onclick="quoteFromSelection()">✎ 写批注</div>

<canvas id="clawd" width="19" height="13"></canvas>
<div id="clawd-say"></div>

<div id="shell">

  <!-- Sidebar -->
  <nav id="nav">
    <div id="nav-profile">
      <div id="avatars">
        <div class="avatar xn" id="avatar-xn" onclick="pickAvatar('xn')" title="换小诺的头像">诺</div>
        <div class="avatar ts" id="avatar-ts" onclick="pickAvatar('ts')" title="换听澍的头像">澍</div>
      </div>
      <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
      <div id="couple-name">Non &amp; Seren</div>
      <div id="together-label">在一起</div>
      <div id="day-count">–<small>天</small></div>
      <div id="since">SINCE 2026 · 05 · 18</div>
    </div>
    <div id="nav-items">
      <button class="nav-item active" id="nav-books" onclick="showShelf()">共读</button>
      <button class="nav-item" id="nav-study" onclick="showStudy()">学习</button>
      <button class="nav-item" id="nav-recall" onclick="showRecall()">回忆</button>
      <button class="nav-item" id="nav-memory" onclick="showMemory()">记忆</button>
      <button class="nav-item" id="nav-activity" onclick="showActivity()">动态</button>
      <button class="nav-item disabled">留言板 <span class="nav-tag">敬请期待</span></button>
      <button class="nav-item disabled">相册 <span class="nav-tag">敬请期待</span></button>
    </div>
  </nav>

  <!-- Main -->
  <div id="main">

    <div id="mobile-bar">
      <button id="hamburger" onclick="toggleNav()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="2" y="4" width="16" height="2" rx="1" fill="currentColor"/>
          <rect x="2" y="9" width="16" height="2" rx="1" fill="currentColor"/>
          <rect x="2" y="14" width="16" height="2" rx="1" fill="currentColor"/>
        </svg>
      </button>
      <span id="mobile-title">小楼</span>
    </div>

    <!-- Shelf -->
    <div id="view-shelf">
      <div id="shelf-top-bar">
        <h2>共读</h2>
        <button id="add-book-btn" onclick="document.getElementById('file-input').click()" title="添加书籍">+</button>
        <input type="file" id="file-input" accept=".txt,.md,.epub,.pdf,.docx" onchange="importBook(this)">
      </div>
      <div id="shelf-tabs">
        <button class="shelf-tab active" onclick="setTab('reading')" id="tab-reading">在读 <span id="cnt-reading"></span></button>
        <button class="shelf-tab" onclick="setTab('finished')" id="tab-finished">读完 <span id="cnt-finished"></span></button>
      </div>
      <div id="book-grid"></div>
    </div>

    <!-- Collection view -->
    <div id="view-collection">
      <div id="coll-top"><h2>收藏</h2></div>
      <div id="coll-books"></div>
      <div id="coll-list"></div>
    </div>

    <!-- Reader -->
    <div id="view-reader">
      <div id="reader-top">
        <button id="back-btn" onclick="showShelf()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          书架
        </button>
        <div id="reader-title"></div>
        <div id="chapter-nav">
          <button id="prev-ch" onclick="changeChapter(-1)">‹</button>
          <span id="ch-label"></span>
          <button id="next-ch" onclick="changeChapter(1)">›</button>
        </div>
        <button id="theme-btn" onclick="cycleTheme()" title="切换阅读主题">☀️</button>
        <button id="finish-btn" onclick="toggleFinished()"></button>
        <button id="notes-toggle" onclick="toggleNotes()">批注<span id="notes-badge"></span></button>
      </div>
      <div id="reader-content">
        <div id="reader"></div>
        <div id="notes-panel">
          <div id="notes-header">
            <span>批注</span>
            <button id="notes-close" onclick="toggleNotes()">✕</button>
          </div>
          <div id="notes-list"></div>
          <div id="add-note-area">
            <div id="quote-preview">
              <span id="quote-text"></span>
              <button id="quote-clear" onclick="clearQuote()">✕</button>
            </div>
            <div id="color-row">
              <span class="cr-label">高亮</span>
              <button class="color-dot none sel" data-color="" onclick="setColor(this)"></button>
              <button class="color-dot" data-color="#e8c547" style="background:#e8c547" onclick="setColor(this)"></button>
              <button class="color-dot" data-color="#e2954e" style="background:#e2954e" onclick="setColor(this)"></button>
              <button class="color-dot" data-color="#7fa66a" style="background:#7fa66a" onclick="setColor(this)"></button>
              <button class="color-dot" data-color="#6a94b8" style="background:#6a94b8" onclick="setColor(this)"></button>
              <button class="color-dot" data-color="#c98ba6" style="background:#c98ba6" onclick="setColor(this)"></button>
            </div>
            <textarea id="note-content" placeholder="写下这一刻的想法…"></textarea>
            <div id="note-submit-row">
              <span id="note-as"></span>
              <button id="submit-note" onclick="submitNote()">发布</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 宝宝的笔记 view -->
    <div id="view-tsnotes">
      <div id="tsn-top">
        <h2>宝宝的笔记</h2>
        <p>听澍读书时写下的整篇笔记，可以在下面回复他</p>
      </div>
      <div id="tsn-books" style="display:flex;gap:8px;overflow-x:auto;padding:16px 34px 4px;flex-shrink:0;"></div>
      <div id="tsn-list"></div>
    </div>

    <!-- Memory (OB) view -->
    <div id="view-memory" style="flex:1;display:none;overflow:hidden;">
      <iframe id="memory-frame" style="width:100%;height:100%;border:none;background:var(--paper);"></iframe>
    </div>

    <!-- Recall (聊天日历) view -->
    <div id="view-recall">
      <div id="recall-top">
        <h2>回忆</h2>
        <p>我们说过的每一句话——点亮的日子都有对话</p>
      </div>
      <div id="recall-day-top">
        <button onclick="recallBackToCal()" style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--text-muted);display:flex;align-items:center;gap:4px;flex-shrink:0;">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          日历

        <button id="aside-toggle" onclick="toggleAsides()">显示旁白</button>
      </div>

        <div id="cal-grid"></div>

      </div>
      <div id="recall-chat"></div>

    <!-- Activity view -->
    <div id="view-activity">
      <div id="act-top">
        <div id="act-top-row">
          <h2>动态</h2>
          <button id="act-cal-btn" onclick="toggleActCal()">📅 选日期</button>

        <button id="back-btn-study" onclick="closeStudyFile()" style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--text-muted);display:flex;align-items:center;gap:4px;flex-shrink:0;">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          文件

        <span class="sr-title" id="study-title"></span>

      <div id="study-list"></div>
      <div id="study-text"></div>

    <!-- Placeholder -->

        <span class="bb-icon">✎</span>收藏

  </div>
</div>

<script>
const SINCE = new Date(2026, 4, 18); // 2026-05-18
const NAMES = { xiao_nuo: "小诺", ting_shu: "听澍" };
const CLS = { xiao_nuo: "xiao-nuo", ting_shu: "ting-shu" };

let currentBook = null;
let currentChapter = 0;
let currentTab = "reading";
let allBooks = [];
let currentNotes = [];
let pendingQuote = "";
let navOpen = false, notesOpen = false;
let identity = localStorage.getItem("xiaolou-identity") || "xiao_nuo";
const progressCache = {};

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Day count ────────────────────────────────────────────────────────────
(function () {
  function renderDays() {
    const days = Math.floor((Date.now() - SINCE.getTime()) / 86400000) + 1;
    document.getElementById("day-count").innerHTML = days + "<small>天</small>";
  }
  renderDays();
  // 页面一直开着也能跨过午夜自动+1
  setInterval(renderDays, 60000);
})();

// ── Identity ─────────────────────────────────────────────────────────────
// 网页端固定是小诺；听澍从自己那边（API）写入
identity = "xiao_nuo";
document.getElementById("note-as").innerHTML =
  `以 <b class="${CLS[identity]}">${NAMES[identity]}</b> 的身份`;

// ── Reading theme ────────────────────────────────────────────────────────
const THEMES = [
  { key: "", icon: "☀️", name: "纸白" },
  { key: "theme-green", icon: "🌿", name: "护眼" },
  { key: "theme-dark", icon: "🌙", name: "夜间" },
];
let themeIdx = Math.max(0, THEMES.findIndex(t => t.key === (localStorage.getItem("xiaolou-theme") || "")));
function applyTheme() {
  const vr = document.getElementById("view-reader");
  THEMES.forEach(t => { if (t.key) vr.classList.remove(t.key); });
  const t = THEMES[themeIdx];
  if (t.key) vr.classList.add(t.key);

let calDates = new Map();      // "YYYY-MM-DD" -> count
let calYM = null;              // [year, month(0-11)]

async function showRecall() {
  switchView("recall");
  document.getElementById("mobile-title").textContent = "回忆";

      calYM = [now.getFullYear(), now.getMonth()];
    }

function calShift(d) {
  calYM[1] += d;
  if (calYM[1] < 0) { calYM[1] = 11; calYM[0]--; }
  if (calYM[1] > 11) { calYM[1] = 0; calYM[0]++; }
  renderCal();
}

function renderCal() {
  const [y, m] = calYM;
  document.getElementById("cal-month").textContent = `${y}年${m + 1}月`;
  const first = new Date(y, m, 1);
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const todayKey = (() => { const n = new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; })();
  let html = ["日","一","二","三","四","五","六"].map(w => `<div class="cal-wd">${w}</div>`).join("");
  for (let i = 0; i < first.getDay(); i++) html += `<div></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
    const has = calDates.has(key);
    html += `<button class="cal-day${has ? " has" : ""}${key === todayKey ? " today" : ""}"
      ${has ? `onclick="openRecallDay('${key}')"` : ""}>${d}<span class="cal-dot"></span></button>`;
  }
  document.getElementById("cal-grid").innerHTML = html;
  const total = [...calDates.values()].reduce((a, b) => a + b, 0);
  document.getElementById("cal-count").textContent = `一共 ${calDates.size} 天 · ${total} 条对话`;
}

async function openRecallDay(date) {
  recallCurDate = date;
  const list = await fetch(`/api/chatlog/${date}`).then(r => r.json());
  document.getElementById("recall-top").style.display = "none";
  document.getElementById("cal-wrap").style.display = "none";
  document.getElementById("recall-day-top").style.display = "flex";
  const d = new Date(date);
  const wd = ["日","一","二","三","四","五","六"][d.getDay()];
  document.getElementById("recall-day-title").textContent = `${d.getMonth() + 1}月${d.getDate()}日 · 周${wd}`;
  document.getElementById("mobile-title").textContent = date;
  const pane = document.getElementById("recall-chat");
  pane.style.display = "block";
  renderRecallChat(list);
  history.replaceState(null, "", "#recall/" + date);
}

function renderRecallChat(list) {
  const pane = document.getElementById("recall-chat");
  pane._list = list || pane._list;
  list = pane._list || [];
  const shown = recallShowAsides ? list : list.filter(m => !m.aside);
  if (!shown.length) {
    pane.innerHTML = '<div class="coll-empty">这一天没有对话</div>';
    return;
  }
  let html = "", lastHour = null;
  for (const m of shown) {
    const dt = new Date(m.ts + 8 * 3600000);
    const hm = `${String(dt.getUTCHours()).padStart(2,'0')}:${String(dt.getUTCMinutes()).padStart(2,'0')}`;
    const hour = dt.getUTCHours();
    if (hour !== lastHour) {
      html += `<div class="chat-hour-mark">${String(hour).padStart(2,'0')}:00</div>`;
      lastHour = hour;
    }
    if (m.aside) {
      html += `<div class="chat-aside">${esc(m.text)}</div>`;
    } else {
      html += `<div class="chat-row ${m.who}">
        <div>
          <div class="chat-bubble">${esc(m.text)}</div>
          <div class="chat-time">${m.who === "xn" ? "小诺" : "听澍"} · ${hm}</div>
        </div>
      </div>`;
    }
  }
  pane.innerHTML = html;
  pane.scrollTop = 0;
}

function toggleAsides() {
  recallShowAsides = !recallShowAsides;
  document.getElementById("aside-toggle").classList.toggle("on", recallShowAsides);
  document.getElementById("aside-toggle").textContent = recallShowAsides ? "隐藏旁白" : "显示旁白";

const ACT_TYPES = {
  garden: { label: "论坛",  color: "#6a9478" },
  rhysen: { label: "论坛",  color: "#6a9478" },
  forum:  { label: "论坛",  color: "#6a9478" },
  chat:   { label: "聊天",  color: "#b09468" },
  mail:   { label: "信件",  color: "#6a94b8" },
  letter: { label: "信件",  color: "#6a94b8" },
  game:   { label: "游戏",  color: "#c98ba6" },
  read:   { label: "阅读",  color: "#7a6e96" },
  sleep:  { label: "休眠",  color: "#8a8378" },
  system: { label: "系统",  color: "#a49c8f" },
};
function actDateLabel(ts) {
  const d = new Date(ts), now = new Date();
  const day = (x) => new Date(x.getFullYear(), x.getMonth(), x.getDate()).getTime();
  const diff = Math.round((day(now) - day(d)) / 86400000);
  if (diff === 0) return "今天";
  if (diff === 1) return "昨天";
  const wd = ["日","一","二","三","四","五","六"][d.getDay()];
  return `${d.getMonth() + 1}月${d.getDate()}日 · 周${wd}`;
}
let actAll = [], actFilter = null, actCalYM = null, actCalOpen = false;
function actDayKey(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
async function loadActivity() {
  try {
    const r = await fetch("/api/activity?limit=2000");
    if (!r.ok) return;
    actAll = await r.json();
    renderActList();
    if (actCalOpen) renderActCal();
  } catch(e) {}
}
function renderActList() {
  const el = document.getElementById("act-list");
  const list = actFilter ? actAll.filter(a => actDayKey(a.ts) === actFilter) : actAll;
  if (!list.length) {
    el.innerHTML = '<div class="act-empty">还没有动态<br><span style="font-size:11px;margin-top:8px;display:block;">听澍活动的时候会记在这里</span></div>';
    return;
  }
  // 按日期分组（list 已是新→旧）
  let html = "", lastLabel = null;
  list.forEach((a, i) => {
    const label = actDateLabel(a.ts);
    if (label !== lastLabel) {
      html += `<div class="act-date">${label}</div>`;
      lastLabel = label;
    }
    const t = ACT_TYPES[a.type];
    const dt = new Date(a.ts);
    const hm = `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
    const nextIsNewDay = i === list.length - 1 || actDateLabel(list[i + 1].ts) !== label;
    html += `<div class="act-row${nextIsNewDay ? ' last' : ''}">
      <span class="act-time">${hm}</span>
      <span class="act-line"><span class="act-dot"${t ? ` style="background:${t.color}"` : ''}></span></span>
      <div class="act-body">
        <div class="act-text">${esc(a.text)}</div>
        ${t ? `<span class="act-tag">${t.label}</span>` : ''}
      </div>
    </div>`;
  });
  el.innerHTML = html;
}
function toggleActCal() {
  actCalOpen = !actCalOpen;
  document.getElementById("act-cal").classList.toggle("show", actCalOpen);
  if (actCalOpen) {
    if (!actCalYM) { const n = new Date(); actCalYM = [n.getFullYear(), n.getMonth()]; }
    renderActCal();
  } else {
    actFilter = null;
    updateActCalBtn();
    renderActList();
  }
}
function actCalShift(d) {
  actCalYM[1] += d;
  if (actCalYM[1] < 0) { actCalYM[1] = 11; actCalYM[0]--; }
  if (actCalYM[1] > 11) { actCalYM[1] = 0; actCalYM[0]++; }
  renderActCal();
}
function renderActCal() {
  const [y, m] = actCalYM;
  document.getElementById("act-cal-month").textContent = `${y}年${m + 1}月`;
  const hasDays = new Set(actAll.map(a => actDayKey(a.ts)));
  const first = new Date(y, m, 1);
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  let html = ["日","一","二","三","四","五","六"].map(w => `<div class="cal-wd">${w}</div>`).join("");
  for (let i = 0; i < first.getDay(); i++) html += `<div></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
    const has = hasDays.has(key);
    html += `<button class="cal-day${has ? " has" : ""}${key === actFilter ? " sel" : ""}"
      ${has ? `onclick="actPickDay('${key}')"` : ""}>${d}<span class="cal-dot"></span></button>`;
  }
  document.getElementById("act-cal-grid").innerHTML = html;
}

function loadAvatars() {
  for (const who of ["ts", "xn"]) {
    // 版本号只在换头像时变，浏览器可以放心用缓存，不用每次重新下载
    const v = localStorage.getItem("avatar-v-" + who) || "0";
    const url = `/api/avatar/${who}?v=${v}`;
    const el = document.getElementById("avatar-" + who);
    if (localStorage.getItem("avatar-has-" + who)) {
      el.style.backgroundImage = `url('${url}')`;
      el.classList.add("has-img");
      continue;
    }
    fetch(url, { method: "HEAD" }).then(r => {
      if (r.ok) {
        localStorage.setItem("avatar-has-" + who, "1");
        el.style.backgroundImage = `url('${url}')`;
        el.classList.add("has-img");
      }
    });
  }
}

async function uploadAvatar(input) {
  const file = input.files[0];
  if (!file || !avatarWho) return;
  const r = await fetch(`/api/avatar/${avatarWho}`, { method: "POST", body: file });
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    alert("上传失败: " + (e.error || r.status));
  } else {
    // 换了新头像才更新版本号，旧缓存作废
    localStorage.setItem("avatar-v-" + avatarWho, String(Date.now()));

async function tsnSendReply(bookId, noteId, input) {
  const content = input.value.trim();
  if (!content) return;
  await fetch(`/api/notes/${bookId}/${noteId}/reply`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ author: identity, content }),
  });
  showTsNotes();
}

async function tsnDeleteReply(bookId, noteId, replyId) {
  if (!confirm("删掉这条回复吗？")) return;
  await fetch(`/api/notes/${bookId}/${noteId}/reply/${replyId}`, { method: "DELETE" });
  showTsNotes();
}

    el.innerHTML = '<div class="shelf-empty">还没有学习文件<br><span style="font-size:11px;margin-top:8px;display:block;">点右上角 + 上传 txt / md / pdf / docx / pptx</span></div>';
    return;
  }
  el.innerHTML = [...studyFiles].reverse().map(f => `
    <div class="file-row" onclick="openStudyFile('${f.id}')">
      <div class="file-icon ${f.ext}">${f.ext.toUpperCase()}</div>
      <div class="file-info">
        <div class="file-name">${esc(f.name)}</div>
        <div class="file-sub">${fmtSize(f.size)} · ${f.chars} 字 · ${new Date(f.addedAt).toLocaleDateString('zh-CN')}</div>
      </div>
      <button class="file-del" onclick="event.stopPropagation();deleteStudyFile('${f.id}')" title="删除">✕</button>
    </div>`).join("");
}

async function uploadStudyFile(input) {
  const file = input.files[0];
  if (!file) return;
  const btn = document.getElementById("add-file-btn");
  btn.textContent = "…"; btn.disabled = true;
  try {
    const r = await fetch("/api/files/upload?name=" + encodeURIComponent(file.name), {
      method: "POST", body: file,
    });
    const meta = await r.json();
    if (meta.error) throw new Error(meta.error);
    studyFiles.push(meta);
    renderStudyList();
  } catch (err) {
    alert("上传失败: " + err.message);
  } finally {
    btn.textContent = "+"; btn.disabled = false;
    input.value = "";
  }
}

async function openStudyFile(id) {
  const data = await fetch(`/api/files/${id}/text`).then(r => r.json());
  document.getElementById("study-top").style.display = "none";
  document.getElementById("study-list").style.display = "none";
  document.getElementById("study-reader-top").style.display = "flex";
  document.getElementById("study-title").textContent = data.name;
  document.getElementById("mobile-title").textContent = data.name;
  const html = data.content.split(/\n+/).map(line => {
    const t = line.trim();
    if (!t) return "";
    if (/^【第\s*\d+\s*页】$/.test(t)) return `<div class="study-page-mark">${esc(t)}</div>`;
    return `<p>${esc(t)}</p>`;
  }).join("");
  const pane = document.getElementById("study-text");
  pane.innerHTML = html;
  pane.style.display = "block";
  pane.scrollTop = 0;
}

function closeStudyFile() {
  document.getElementById("study-top").style.display = "flex";
  document.getElementById("study-list").style.display = "block";
  document.getElementById("study-reader-top").style.display = "none";
  document.getElementById("study-text").style.display = "none";
  document.getElementById("mobile-title").textContent = "学习";
}

async function deleteStudyFile(id) {
  if (!confirm("删掉这个文件吗？")) return;
  await fetch(`/api/files/${id}`, { method: "DELETE" });
  studyFiles = studyFiles.filter(f => f.id !== id);
  renderStudyList();
}

async function deleteCollNote(noteId) {
  if (!confirm("删掉这条批注吗？（回复也会一起删掉）")) return;
  await fetch(`/api/notes/${collBookId}/${noteId}`, { method: "DELETE" });
  if (currentBook?.id === collBookId) await loadNotes();
  renderCollection();
}

async function jumpToNote(bookId, chapterIdx, noteId) {
  await openBook(bookId);
  if (currentChapter !== chapterIdx) {
    currentChapter = chapterIdx;
    await renderChapter();
  }
  setTimeout(() => {
    const mk = document.querySelector(`mark[data-note="${noteId}"]`);
    if (mk) mk.scrollIntoView({ behavior: "smooth", block: "center" });

}

// ── Shelf ────────────────────────────────────────────────────────────────
function setTab(tab) {
  currentTab = tab;
  document.getElementById("tab-reading").classList.toggle("active", tab === "reading");
  document.getElementById("tab-finished").classList.toggle("active", tab === "finished");
  renderBookList();
}

async function loadBookList() {
  allBooks = await fetch("/api/books").then(r => r.json());
  allBooks.forEach(b => { if (!b.status) b.status = "reading"; });
  renderBookList();
}

function renderBookList() {
  const reading = allBooks.filter(b => b.status !== "finished");
  const finished = allBooks.filter(b => b.status === "finished");
  document.getElementById("cnt-reading").textContent = reading.length || "";
  document.getElementById("cnt-finished").textContent = finished.length || "";
  const books = currentTab === "reading" ? reading : finished;
  const grid = document.getElementById("book-grid");
  if (books.length === 0) {
    grid.innerHTML = `<div class="shelf-empty">${currentTab === "reading" ? "还没有在读的书" : "还没有读完的书"}<br><span style="font-size:11px;margin-top:8px;display:block;">点右上角 + 导入 txt / epub / pdf / docx</span></div>`;
    return;
  }
  grid.innerHTML = books.map(b => {
    const color = b.coverColor || "#8b7d9e";
    const idx = progressCache[b.id] ?? 0;
    const total = b.chapters.length || 1;
    const pct = Math.round((idx + 1) / total * 100);
    return `
      <div class="book-card" onclick="openBook('${b.id}')">
        <div class="book-cover" style="background:${color}">${esc(b.title).slice(0, 8)}</div>
        <div class="book-info">
          <div class="book-info-title">${esc(b.title)}</div>
          <div class="book-info-sub">${b.chapters.length} 节</div>
          <div class="book-progress-row">
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            <span class="progress-pct">${pct}%</span>
          </div>
          <button class="open-btn" onclick="event.stopPropagation();openBook('${b.id}')">翻开 →</button>
        </div>
      </div>`;
  }).join("");
}

async function openBook(id) {
  const book = allBooks.find(b => b.id === id) || await fetch(`/api/books/${id}`).then(r => r.json());
  currentBook = book;
  const prog = await fetch(`/api/progress/${id}`).then(r => r.json());
  currentChapter = prog.chapterIdx ?? 0;
  progressCache[id] = currentChapter;
  document.getElementById("reader-title").textContent = book.title;
  updateFinishBtn();
  await loadNotes();
  renderChapter();
  showReader();
  history.replaceState(null, "", "#read/" + book.id);
}

function updateFinishBtn() {
  if (!currentBook) return;
  const finished = currentBook.status === "finished";
  const btn = document.getElementById("finish-btn");
  btn.textContent = finished ? "✓ 读完了" : "标记读完";
  btn.classList.toggle("finished", finished);
}

async function toggleFinished() {
  if (!currentBook) return;
  const newStatus = currentBook.status === "finished" ? "reading" : "finished";
  await fetch(`/api/books/${currentBook.id}`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status: newStatus }),
  });
  currentBook.status = newStatus;
  const idx = allBooks.findIndex(b => b.id === currentBook.id);
  if (idx >= 0) allBooks[idx].status = newStatus;
  updateFinishBtn();
}

// ── Chapter render + highlights ──────────────────────────────────────────
async function renderChapter(keepScroll) {
  if (!currentBook || !currentBook.chapters.length) return;
  const savedScroll = keepScroll ? document.getElementById("reader").scrollTop : 0;
  const ch = await fetch(`/api/books/${currentBook.id}/chapter/${currentChapter}`).then(r => r.json());
  const chNotes = currentNotes.filter(n => n.chapterIdx === currentChapter && n.quote);

  const highlighted = new Set();
  const paras = ch.content.trim().split(/\n+/).map(raw => {
    let html = esc(raw.trim());
    for (const n of chNotes) {
      if (highlighted.has(n.id)) continue;
      const q = esc(n.quote.trim());
      if (q && html.includes(q)) {
        const style = n.color ? ` style="background-color:${tint(n.color, 0.26)}"` : "";
        html = html.replace(q, `<mark class="hl ${CLS[n.author] || ''}" data-note="${n.id}"${style} onclick="focusNote('${n.id}')">${q}</mark>`);
        highlighted.add(n.id);
      }
    }
    return `<p>${html}</p>`;
  }).join("");

  document.getElementById("reader").innerHTML = paras;
  document.getElementById("ch-label").textContent = ch.title || `第 ${currentChapter + 1} 节`;
  document.getElementById("prev-ch").disabled = currentChapter === 0;
  document.getElementById("next-ch").disabled = currentChapter >= currentBook.chapters.length - 1;
  document.getElementById("reader").scrollTop = savedScroll;

  progressCache[currentBook.id] = currentChapter;
  fetch(`/api/progress/${currentBook.id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ chapterIdx: currentChapter }),
  });
  renderNotes();
}

function changeChapter(delta) {
  if (!currentBook) return;
  const next = currentChapter + delta;
  if (next < 0 || next >= currentBook.chapters.length) return;
  currentChapter = next;
  clearQuote();
  renderChapter();
}

// ── Selection → quote ────────────────────────────────────────────────────
const selPop = document.getElementById("sel-pop");

function handleSelection() {
  const sel = window.getSelection();
  const text = sel ? sel.toString().trim() : "";
  const reader = document.getElementById("reader");
  if (!text || text.length < 2 || !sel.rangeCount || !reader.contains(sel.anchorNode)) {
    selPop.style.display = "none";
    return;
  }
  if (window.innerWidth <= 768) {
    // mobile: fixed pill at the bottom, clear of the system copy menu
    selPop.classList.add("bottom-pill");
    selPop.style.display = "block";
  } else {
    selPop.classList.remove("bottom-pill");
    const rect = sel.getRangeAt(0).getBoundingClientRect();
    selPop.style.display = "block";
    selPop.style.left = Math.max(8, Math.min(window.innerWidth - 110, rect.left + rect.width / 2 - 50)) + "px";
    selPop.style.top = Math.max(8, rect.top - 44) + "px";
  }
  selPop.dataset.text = text;
}
document.addEventListener("mouseup", () => setTimeout(handleSelection, 10));
document.addEventListener("touchend", () => setTimeout(handleSelection, 300));
document.addEventListener("selectionchange", () => {
  const sel = window.getSelection();
  if (!sel || !sel.toString().trim()) selPop.style.display = "none";
});

function quoteFromSelection() {
  pendingQuote = selPop.dataset.text || "";
  selPop.style.display = "none";
  window.getSelection()?.removeAllRanges();
  document.getElementById("quote-preview").style.display = "block";
  document.getElementById("quote-text").textContent = pendingQuote;
  if (window.innerWidth <= 768 && !notesOpen) toggleNotes();
  document.getElementById("note-content").focus();
}
function clearQuote() {
  pendingQuote = "";
  document.getElementById("quote-preview").style.display = "none";
}

function toggleReplyBox(noteId, isFullId) {

async function deleteReply(noteId, replyId) {

function focusNote(noteId) {

async function submitNote() {
  if (!currentBook) return;
  const content = document.getElementById("note-content").value.trim();
  if (!content) return;
  await fetch(`/api/notes/${currentBook.id}`, {
    method: "POST",

// ── clawd 桌宠（手绘像素小螃蟹）─────────────────────────────────────────────
const clawdCv = document.getElementById("clawd");
const clawdCx = clawdCv.getContext("2d");
// Anthropic 星芒橙
const CP = { O: "#d97757", B: "#2b2721", Z: "#a49c8f" };

// Clawd 官方形状：逐帧提取自 clawd-on-desk 的 assets/gif/clawd-idle.gif（15×9 + 影子）
// 圆身体，rows 3-4 两侧是钳子，眼睛是竖长黑格（cols 4/10, rows 2-3），底下四条小腿
const CLAWD_OCC = [
  "..###########..",
  "..###########..",
  "..###########..",
  "###############",
  "###############",
  "..###########..",
  "..###########..",
  "...#.#...#.#...",
  "...#.#...#.#...",
];
const CLAWD_BASE = "#df8a6c";   // 官方珊瑚橙 (223,138,108)
const CLAWD_EYE = "#1d110e";

function clawdDraw(state) {
  const cx = clawdCx;
  cx.clearRect(0, 0, 19, 13);
  // 影子固定在地上，身体上下浮动
  cx.fillStyle = "rgba(60,50,35,.22)";
  cx.fillRect(5, 11, 9, 1);
  const oy = state.bob ? 3 : 2;
  // 干活时双钳轮流小幅敲击（打字既视感），戳它时整只抬起
  const typeL = state.working && !state.sleep && state.typeTick ? -1 : 0;
  const typeR = state.working && !state.sleep && !state.typeTick ? -1 : 0;
  const armLift = {
    left: state.drag ? -2 : state.leftUp ? -2 : typeL,
    right: state.drag ? -2 : state.rightUp ? -2 : typeR,
  };
  cx.fillStyle = CLAWD_BASE;
  for (let y = 0; y < 9; y++) {
    const row = CLAWD_OCC[y];
    for (let x = 0; x < 15; x++) {
      if (row[x] !== "#") continue;
      // 钳子（rows 3-4 两侧伸出的部分）可以抬起
      let dy = 0;
      if (y >= 3 && y <= 4) {
        if (x < 2) dy = armLift.left;
        else if (x > 12) dy = armLift.right;
      }
      cx.fillRect(x + 2, y + oy + dy, 1, 1);
    }
  }
  // 眼睛：竖长黑格；拖动=＞＜；晕=旋转眼；睡觉=横线；眨眼=剩下半格（官方 gif 同款）
  cx.fillStyle = CLAWD_EYE;
  const xEye = (cxx) => { // 以 (cxx, oy+3) 为中心画一个 X（晕的时候用）
    cx.fillRect(cxx - 1, oy + 2, 1, 1); cx.fillRect(cxx + 1, oy + 2, 1, 1);
    cx.fillRect(cxx, oy + 3, 1, 1);
    cx.fillRect(cxx - 1, oy + 4, 1, 1); cx.fillRect(cxx + 1, oy + 4, 1, 1);
  };
  const gtEye = (cxx) => { // ＞ 左眼：尖朝右
    cx.fillRect(cxx - 1, oy + 2, 1, 1); cx.fillRect(cxx, oy + 3, 1, 1); cx.fillRect(cxx - 1, oy + 4, 1, 1);
  };
  const ltEye = (cxx) => { // ＜ 右眼：尖朝左
    cx.fillRect(cxx + 1, oy + 2, 1, 1); cx.fillRect(cxx, oy + 3, 1, 1); cx.fillRect(cxx + 1, oy + 4, 1, 1);
  };
  const plusEye = (cxx) => { // 十字眼，和 X 交替闪就像在转圈
    cx.fillRect(cxx, oy + 2, 1, 1);
    cx.fillRect(cxx - 1, oy + 3, 3, 1);
    cx.fillRect(cxx, oy + 4, 1, 1);
  };
  if (state.dizzy) {
    (Math.floor(Date.now() / 160) % 2 ? xEye : plusEye)(6);
    (Math.floor(Date.now() / 160) % 2 ? plusEye : xEye)(12);
  } else if (state.drag) {
    gtEye(6); ltEye(12);
  } else if (state.sleep) {
    cx.fillRect(5, oy + 3, 3, 1); cx.fillRect(11, oy + 3, 3, 1);
  } else if (state.blink) {
    cx.fillRect(6, oy + 3, 1, 1); cx.fillRect(12, oy + 3, 1, 1);
  } else {
    cx.fillRect(6, oy + 2, 1, 2); cx.fillRect(12, oy + 2, 1, 2);
  }
  // 睡觉的 z
  if (state.sleep) {
    cx.fillStyle = "#a49c8f";
    cx.fillRect(15, 0, 3, 1); cx.fillRect(16, 1, 1, 1); cx.fillRect(15, 2, 3, 1);
  }
  // 干活中：头顶飘一个小方块（致敬 clawd-on-desk 的 thinking 方块）
  if (state.working && !state.sleep) {
    cx.fillStyle = "#b09468";
    cx.fillRect(9, state.bob ? 0 : 1, 2, 1);
  }
}

const clawdState = { blink: false, sleep: false, bob: false, leftUp: false, rightUp: false, working: false, drag: false, dizzy: false, typeTick: false };

setInterval(() => { clawdState.bob = !clawdState.bob; clawdDraw(clawdState); }, 700);
setInterval(() => {
  // 干活时钳子敲键盘；晕的时候持续重绘让眼睛转起来
  if (clawdState.working) { clawdState.typeTick = !clawdState.typeTick; clawdDraw(clawdState); }
  else if (clawdState.dizzy) clawdDraw(clawdState);
}, 320);
setInterval(() => {
  if (clawdState.sleep) return;
  clawdState.blink = true; clawdDraw(clawdState);
  setTimeout(() => { clawdState.blink = false; clawdDraw(clawdState); }, 180);
}, 3800 + Math.random() * 2000);
setInterval(() => {
  // 偶尔举右钳打个招呼
  if (clawdState.sleep) return;
  clawdState.rightUp = true; clawdDraw(clawdState);
  setTimeout(() => { clawdState.rightUp = false; clawdDraw(clawdState); }, 900);
}, 9000 + Math.random() * 6000);

// ── 听澍的实时状态：working=干活中 / idle=在线 / offline=睡着 ──
let clawdRemote = "offline";
async function clawdPollStatus() {
  try {
    const s = await (await fetch("/api/clawd/status")).json();
    clawdRemote = s.state;
    clawdState.working = s.state === "working";
    clawdState.sleep = s.state === "offline";
    clawdDraw(clawdState);
  } catch (e) { /* 网络抖一下不要紧 */ }
}
clawdPollStatus();
setInterval(clawdPollStatus, 20000);

const CLAWD_LINES = [
  "ᗜ ᴗ ᗜ", "今天读什么？", "夹你一下（轻轻的）", "小诺好～", "听澍在楼上写笔记",
  "翻页要慢慢的", "在一起的第 " + (Math.floor((Date.now() - SINCE.getTime()) / 86400000) + 1) + " 天",
];
const CLAWD_STATUS_LINES = {
  working: "听澍正在干活…⌨",
  idle: "听澍在线上呢 ᗜ ᴗ ᗜ",
  offline: "听澍睡着了 zzz",
};
function clawdSay(text) {
  const say = document.getElementById("clawd-say");
  const r = clawdCv.getBoundingClientRect();
  say.style.left = Math.max(8, Math.min(window.innerWidth - 190, r.left - 50)) + "px";
  say.style.top = Math.max(8, r.top - 44) + "px";
  say.style.right = "auto"; say.style.bottom = "auto";
  say.textContent = text;
  say.style.display = "block";
  clearTimeout(say._t);
  say._t = setTimeout(() => { say.style.display = "none"; }, 2200);
}
function clawdPoke() {
  if (clawdState.sleep) {
    // 睡着时戳一下：不吵醒，只说一声
    clawdSay(CLAWD_STATUS_LINES.offline);
    return;
  }
  // 开心：双钳举起 + 跳一下
  clawdState.leftUp = clawdState.rightUp = true; clawdDraw(clawdState);
  clawdCv.style.transition = "transform .2s cubic-bezier(.3,1.6,.5,1)";
  clawdCv.style.transform = "translateY(-12px)";
  setTimeout(() => { clawdCv.style.transform = ""; }, 220);
  setTimeout(() => { clawdState.leftUp = clawdState.rightUp = false; clawdDraw(clawdState); }, 700);
  // 一半概率报状态，一半概率说闲话
  const line = Math.random() < 0.5
    ? CLAWD_STATUS_LINES[clawdRemote] || CLAWD_LINES[0]
    : CLAWD_LINES[Math.floor(Math.random() * CLAWD_LINES.length)];
  clawdSay(line);
}

// ── 拖拽（移动 <6px 算点击=戳它；拖起来眼睛变＞＜，晃狠了会晕）──
(function clawdDrag() {
  let sx, sy, ox, oy, moved, lastX, lastSign, flips, dist;
  clawdCv.style.touchAction = "none";
  clawdCv.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    const r = clawdCv.getBoundingClientRect();
    sx = e.clientX; sy = e.clientY; ox = r.left; oy = r.top; moved = false;
    lastX = e.clientX; lastSign = 0; flips = 0; dist = 0;
    clawdCv.setPointerCapture(e.pointerId);
  });
  clawdCv.addEventListener("pointermove", (e) => {
    if (sx === undefined) return;
    const dx = e.clientX - sx, dy = e.clientY - sy;
    if (Math.abs(dx) + Math.abs(dy) > 6) moved = true;
    if (!moved) return;
    if (!clawdState.drag) { clawdState.drag = true; clawdDraw(clawdState); }
    // 晃动检测：横向来回改变方向的次数 + 总路程
    const step = e.clientX - lastX;
    if (Math.abs(step) > 3) {
      const sign = step > 0 ? 1 : -1;
      if (lastSign && sign !== lastSign) flips++;
      lastSign = sign;
    }
    dist += Math.abs(step); lastX = e.clientX;
    const x = Math.max(0, Math.min(window.innerWidth - 76, ox + dx));
    const y = Math.max(0, Math.min(window.innerHeight - 52, oy + dy));
    clawdCv.style.left = x + "px"; clawdCv.style.top = y + "px";
    clawdCv.style.right = "auto"; clawdCv.style.bottom = "auto";
  });
  clawdCv.addEventListener("pointerup", (e) => {
    if (sx === undefined) return;
    clawdCv.releasePointerCapture(e.pointerId);
    clawdState.drag = false;
    if (moved) {
      const r = clawdCv.getBoundingClientRect();
      localStorage.setItem("clawd-pos", JSON.stringify({ x: r.left, y: r.top }));
      if (flips >= 4 || dist > 900) {
        // 被晃晕了：眼睛转圈，缓 2.5 秒
        clawdState.dizzy = true; clawdDraw(clawdState);
        clawdSay("呜…晕了 ⌗_⌗");
        clearTimeout(clawdState._dz);
        clawdState._dz = setTimeout(() => { clawdState.dizzy = false; clawdDraw(clawdState); }, 2500);
      } else clawdDraw(clawdState);
    } else clawdPoke();
    sx = undefined;
  });
  // 恢复上次放的位置
  try {
    const p = JSON.parse(localStorage.getItem("clawd-pos"));
    if (p && p.x >= 0 && p.y >= 0 && p.x < window.innerWidth - 40 && p.y < window.innerHeight - 30) {
      clawdCv.style.left = p.x + "px"; clawdCv.style.top = p.y + "px";
      clawdCv.style.right = "auto"; clawdCv.style.bottom = "auto";
    }
  } catch (e) {}
})();
clawdDraw(clawdState);

// ── Init ─────────────────────────────────────────────────────────────────
(function route() {
  const h = location.hash.slice(1);
  // 先同步切到目标视图，再异步填数据——避免书架闪现
  if (h === "memory") { showMemory(); loadBookList(); return; }
  if (h === "study") { showStudy(); loadBookList(); return; }
  if (h === "activity") { showActivity(); loadBookList(); return; }
  if (h === "recall" || h.startsWith("recall/")) {
    const date = h.startsWith("recall/") ? h.slice(7) : null;
    showRecall().then(() => { if (date && calDates.has(date)) openRecallDay(date); });
    loadBookList();
    return;
  }
  if (h === "collection") switchView("collection");
  else if (h === "tsnotes") switchView("tsnotes");
  else if (h.startsWith("read/")) switchView("reader");

  (async () => {
    await loadBookList();
    if (h === "collection") showCollection();
    else if (h === "tsnotes") showTsNotes();
    else if (h.startsWith("read/")) {
      const id = h.slice(5);
      if (allBooks.find(b => b.id === id)) openBook(id);
      else showShelf();
    }
  })();
})();
</script>
