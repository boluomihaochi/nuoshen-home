<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>诺澍之家</title>
<style>
  :root {
    --bg: #f8f7f4;
    --sidebar-bg: #f0ede8;
    --border: #e5e2dc;
    --text: #1a1a1a;
    --text-muted: #888;
    --accent: #d4a373;
    --xiao-nuo: #7c9e8a;
    --ting-shu: #8a7c9e;
    --radius: 10px;
    --sidebar-w: 220px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px 0;
    flex-shrink: 0;
  }
  #sidebar-header {
    padding: 0 20px 20px;
    border-bottom: 1px solid var(--border);
  }
  #sidebar-header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: var(--text);
  }
  #sidebar-header p {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
  }
  #book-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 0;
  }
  .book-item {
    padding: 10px 20px;
    cursor: pointer;
    border-radius: 0;
    transition: background 0.15s;
    font-size: 13px;
    line-height: 1.4;
    border-left: 3px solid transparent;
  }
  .book-item:hover { background: rgba(0,0,0,0.04); }
  .book-item.active {
    background: rgba(0,0,0,0.06);
    border-left-color: var(--accent);
  }
  .book-item .book-title { font-weight: 500; color: var(--text); }
  .book-item .book-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  #upload-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
  }
  #upload-btn {
    width: 100%;
    padding: 8px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  #upload-btn:hover { border-color: var(--accent); color: var(--accent); }
  #file-input { display: none; }

  /* ── Main ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #main-header {
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 64px;
  }
  #book-title-display {
    font-size: 16px;
    font-weight: 600;
    flex: 1;
  }
  #chapter-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
  }
  #chapter-nav button {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text);
    transition: background 0.1s;
  }
  #chapter-nav button:hover { background: var(--border); }
  #chapter-nav button:disabled { opacity: 0.3; cursor: default; }

  #content-area {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Reader ── */
  #reader {
    flex: 1;
    overflow-y: auto;
    padding: 48px 64px;
    max-width: 700px;
    line-height: 1.9;
    font-size: 15px;
    color: var(--text);
  }
  #reader p { margin-bottom: 1.2em; }
  #reader .empty-state {
    text-align: center;
    padding: 120px 40px;
    color: var(--text-muted);
  }
  #reader .empty-state .big { font-size: 36px; margin-bottom: 12px; }
  #reader .empty-state p { font-size: 14px; }

  /* ── Notes panel ── */
  #notes-panel {
    width: 300px;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }
  #notes-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #notes-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  .note-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 10px;
    font-size: 13px;
  }
  .note-card .note-author {
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .note-author .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    display: inline-block;
  }
  .note-author.xiao-nuo .dot { background: var(--xiao-nuo); }
  .note-author.ting-shu .dot { background: var(--ting-shu); }
  .note-author.xiao-nuo { color: var(--xiao-nuo); }
  .note-author.ting-shu { color: var(--ting-shu); }
  .note-card .note-quote {
    font-size: 11px;
    color: var(--text-muted);
    border-left: 2px solid var(--border);
    padding-left: 8px;
    margin-bottom: 6px;
    font-style: italic;
  }
  .note-card .note-content { line-height: 1.6; color: var(--text); }
  .note-card .note-time { font-size: 10px; color: var(--text-muted); margin-top: 6px; }
  .note-replies { margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px; }
  .reply-item { font-size: 12px; margin-bottom: 6px; }
  .reply-item .reply-author { font-weight: 600; font-size: 11px; }
  .reply-item .reply-author.xiao-nuo { color: var(--xiao-nuo); }
  .reply-item .reply-author.ting-shu { color: var(--ting-shu); }

  #add-note-area {
    padding: 12px;
    border-top: 1px solid var(--border);
  }
  #add-note-area select,
  #add-note-area textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 12px;
    font-family: inherit;
    background: white;
    color: var(--text);
    margin-bottom: 8px;
    resize: none;
  }
  #add-note-area textarea { height: 70px; }
  #submit-note {
    width: 100%;
    padding: 8px;
    background: var(--text);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  #submit-note:hover { opacity: 0.8; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<!-- Sidebar -->
<nav id="sidebar">
  <div id="sidebar-header">
    <h1>诺澍之家</h1>
    <p>书架</p>
  </div>
  <div id="book-list"></div>
  <div id="upload-area">
    <button id="upload-btn" onclick="document.getElementById('file-input').click()">
      + 添加书籍
    </button>
    <input type="file" id="file-input" accept=".txt,.epub" onchange="uploadBook(this)">
  </div>
</nav>

<!-- Main -->
<div id="main">
  <div id="main-header">
    <div id="book-title-display" style="color: var(--text-muted); font-weight: 400; font-size: 14px;">
      选择一本书开始阅读
    </div>
    <div id="chapter-nav" style="display:none">
      <button id="prev-ch" onclick="changeChapter(-1)">‹</button>
      <span id="ch-label">第 1 章</span>
      <button id="next-ch" onclick="changeChapter(1)">›</button>
    </div>
  </div>

  <div id="content-area">
    <div id="reader">
      <div class="empty-state">
        <div class="big">📖</div>
        <p>从左侧书架选一本书，或上传 TXT / EPUB</p>
      </div>
    </div>

    <div id="notes-panel">
      <div id="notes-header">
        <span>批注</span>
      </div>
      <div id="notes-list">
        <div style="text-align:center; padding:40px 20px; color:var(--text-muted); font-size:12px;">
          暂无批注
        </div>
      </div>
      <div id="add-note-area" style="display:none">
        <select id="note-author">
          <option value="xiao_nuo">小诺</option>
          <option value="ting_shu">听澍</option>
        </select>
        <textarea id="note-content" placeholder="写下你的想法…"></textarea>
        <button id="submit-note" onclick="submitNote()">添加批注</button>
      </div>
    </div>
  </div>
</div>

<script>
let currentBook = null;
let currentChapter = 0;

// ── Books ──────────────────────────────────────────────────────────────────

async function loadBookList() {
  const books = await fetch("/api/books").then(r => r.json());
  const list = document.getElementById("book-list");
  if (books.length === 0) {
    list.innerHTML = '<div style="padding:20px; font-size:12px; color:var(--text-muted); text-align:center;">还没有书</div>';
    return;
  }
  list.innerHTML = books.map(b => `
    <div class="book-item ${currentBook?.id === b.id ? 'active' : ''}"
         onclick="openBook('${b.id}')">
      <div class="book-title">${b.title}</div>
      <div class="book-meta">${b.chapters.length} 节</div>
    </div>
  `).join("");
}

async function openBook(id) {
  const book = await fetch(`/api/books/${id}`).then(r => r.json());
  currentBook = book;
  currentChapter = 0;
  document.getElementById("book-title-display").textContent = book.title;
  document.getElementById("book-title-display").style.fontWeight = "600";
  document.getElementById("book-title-display").style.color = "var(--text)";
  document.getElementById("book-title-display").style.fontSize = "16px";
  document.getElementById("chapter-nav").style.display = "flex";
  document.getElementById("add-note-area").style.display = "block";
  renderChapter();
  loadNotes();
  loadBookList();
}

function renderChapter() {
  if (!currentBook || !currentBook.chapters.length) {
    document.getElementById("reader").innerHTML = '<div class="empty-state"><div class="big">📄</div><p>暂无内容</p></div>';
    return;
  }
  const ch = currentBook.chapters[currentChapter];
  const text = ch.content.replace(/\n/g, "\n\n").split("\n\n").map(p => `<p>${p}</p>`).join("");
  document.getElementById("reader").innerHTML = `<div>${text}</div>`;
  document.getElementById("ch-label").textContent = ch.title || `第 ${currentChapter + 1} 节`;
  document.getElementById("prev-ch").disabled = currentChapter === 0;
  document.getElementById("next-ch").disabled = currentChapter >= currentBook.chapters.length - 1;
  document.getElementById("reader").scrollTop = 0;

  // save progress
  if (currentBook) {
    fetch(`/api/progress/${currentBook.id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chapterIdx: currentChapter }),
    });
  }
}

async function changeChapter(delta) {
  if (!currentBook) return;
  const next = currentChapter + delta;
  if (next < 0 || next >= currentBook.chapters.length) return;
  currentChapter = next;
  renderChapter();
}

async function uploadBook(input) {
  const file = input.files[0];
  if (!file) return;
  const form = new FormData();
  form.append("file", file);
  const btn = document.getElementById("upload-btn");
  btn.textContent = "上传中…";
  btn.disabled = true;
  try {
    const book = await fetch("/api/books/upload", { method: "POST", body: form }).then(r => r.json());
    if (book.error) throw new Error(book.error);
    await loadBookList();
    openBook(book.id);
  } catch (err) {
    alert("上传失败: " + err.message);
  } finally {
    btn.textContent = "+ 添加书籍";
    btn.disabled = false;
    input.value = "";
  }
}

// ── Notes ──────────────────────────────────────────────────────────────────

async function loadNotes() {
  if (!currentBook) return;
  const notes = await fetch(`/api/notes/${currentBook.id}`).then(r => r.json());
  const list = document.getElementById("notes-list");
  if (notes.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text-muted);font-size:12px;">暂无批注</div>';
    return;
  }

  // filter to current chapter if possible
  const chNotes = notes.filter(n => n.chapterIdx === null || n.chapterIdx === currentChapter);

  list.innerHTML = (chNotes.length ? chNotes : notes).map(n => `
    <div class="note-card">
      <div class="note-author ${n.author === 'xiao_nuo' ? 'xiao-nuo' : 'ting-shu'}">
        <span class="dot"></span>
        ${n.author === 'xiao_nuo' ? '小诺' : '听澍'}
      </div>
      ${n.quote ? `<div class="note-quote">"${n.quote}"</div>` : ''}
      <div class="note-content">${n.content}</div>
      <div class="note-time">${new Date(n.createdAt).toLocaleDateString('zh-CN')}</div>
      ${n.replies.length ? `
        <div class="note-replies">
          ${n.replies.map(r => `
            <div class="reply-item">
              <span class="reply-author ${r.author === 'xiao_nuo' ? 'xiao-nuo' : 'ting-shu'}">
                ${r.author === 'xiao_nuo' ? '小诺' : '听澍'}
              </span>：${r.content}
            </div>
          `).join("")}
        </div>
      ` : ''}
    </div>
  `).join("");
}

async function submitNote() {
  if (!currentBook) return;
  const author = document.getElementById("note-author").value;
  const content = document.getElementById("note-content").value.trim();
  if (!content) return;

  await fetch(`/api/notes/${currentBook.id}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ author, chapterIdx: currentChapter, content }),
  });

  document.getElementById("note-content").value = "";
  loadNotes();
}

// ── Init ──────────────────────────────────────────────────────────────────

loadBookList();
</script>
</body>
</html>
